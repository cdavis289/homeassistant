blueprint:
  name: Motion Activated Light with Disable Allowed
  description: Turn a light on based on detected motion and disable motion detection
  domain: automation
  input:
    motion_sensor:
      name: Motion Sensor
      description: Sensor used to turn on/off light entity.
      selector:
        entity:
          domain: binary_sensor
          device_class: motion
    target_light:
      name: Lights
      description: The lights triggered by motion sensor
      selector:
        target:
          entity:
            domain: light
    motion_status:
      name: Motion Activation Status
      description: Input boolean variable to track motion activation status
      selector:
        entity:
          domain: input_boolean

trigger:
  - platform: state
    entity_id:
      - !input motion_sensor
    from: "off"
    to: "on"
    for:
      hours: 0
      minutes: 0
      seconds: 0
    id: "1"
  - platform: state
    entity_id:
      - !input motion_sensor
    from: "on"
    to: "off"
    for:
      hours: 0
      minutes: 0
      seconds: 5
    id: "2"
  - platform: state
    entity_id:
      - !input target_light
    from: "off"
    to: "on"
    id: "3"
  - platform: state
    entity_id:
      - !input target_light
    from: "on"
    to: "off"
    id: "4"
condition: []
action:
  - choose:
      - conditions:
          - condition: and
            conditions:
              - condition: trigger
                id: "1"
              - condition: state
                entity_id: !input motion_status
                state: "on"
        sequence:
          - service: light.turn_on
            data: {}
            target:
              entity_id: !input target_light
      - conditions:
          - condition: and
            conditions:
              - condition: state
                entity_id: !input target_light
                state: "on"
              - condition: trigger
                id: "2"
        sequence:
          - service: light.turn_off
            data:
              transition: 2
            target:
              entity_id: !input target_light
          - if:
              - condition: state
                entity_id: !input motion_status
                state: "off"
            then:
              - service: homeassistant.turn_on
                data: {}
                target:
                  entity_id: !input motion_status
      - conditions:
          - condition: and
            conditions:
              - condition: trigger
                id: "3"
              - condition: state
                entity_id: !input motion_status
                state: "off"
        sequence:
          - service: homeassistant.turn_on
            data: {}
            target:
              entity_id: !input motion_status
      - conditions:
          - condition: and
            conditions:
              - condition: trigger
                id: "4"
              - condition: state
                entity_id: !input motion_status
                state: "on"
              - condition: state
                entity_id: !input motion_sensor
                state: "on"
        sequence:
          - service: homeassistant.turn_off
            data: {}
            target:
              entity_id: !input motion_status
mode: single
  
